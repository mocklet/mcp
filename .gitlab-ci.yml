image: golang:latest

stages:
  - test
  - security
  - build
  - release

variables:
  GOPATH: $CI_PROJECT_DIR/.go
  CGO_ENABLED: 0

cache:
  paths:
    - .go/pkg/mod/

include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml
  - template: Security/Dependency-Scanning.gitlab-ci.yml

format:
  stage: test
  script:
    - go fmt ./...
    - go vet ./...

test:
  stage: test
  script:
    - go test -v -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week

lint:
  image: golangci/golangci-lint:latest
  stage: test
  script:
    - golangci-lint run -v --timeout 5m

build:
  stage: build
  script:
    - GOOS=linux GOARCH=amd64 go build -o mocklet-mcp-linux-amd64 .
    - GOOS=linux GOARCH=arm64 go build -o mocklet-mcp-linux-arm64 .
    - GOOS=windows GOARCH=amd64 go build -o mocklet-mcp-windows-amd64.exe .
    - GOOS=darwin GOARCH=amd64 go build -o mocklet-mcp-darwin-amd64 .
    - GOOS=darwin GOARCH=arm64 go build -o mocklet-mcp-darwin-arm64 .
  artifacts:
    paths:
      - mocklet-mcp-linux-amd64
      - mocklet-mcp-linux-arm64
      - mocklet-mcp-windows-amd64.exe
      - mocklet-mcp-darwin-amd64
      - mocklet-mcp-darwin-arm64
    expire_in: 1 month

release:
  stage: release
  image: node:20
  before_script:
    - npm install -g semantic-release @semantic-release/gitlab @semantic-release/commit-analyzer @semantic-release/release-notes-generator
  script:
    - npx semantic-release
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
